name: explonz_app
description: Explonz - Flutter App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.13.0-133.0.dev

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 状态管理
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3

  # 路由
  go_router: ^14.6.3

  # 网络
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # 函数式错误处理
  fpdart: ^1.1.0

  # 数据模型
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0

  # 本地存储
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2

  # 系统权限
  permission_handler: ^11.3.1
  app_settings: ^7.0.0

  # 工具
  equatable: ^2.0.7
  intl: ^0.20.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # 代码生成
  build_runner: ^2.15.0
  freezed: ^3.2.5
  json_serializable: ^6.14.0
  riverpod_generator: ^4.0.4

  # 测试
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/launch and authentication/
    - assets/icons/
